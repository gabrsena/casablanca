<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64" role="img">
  <title>ProClean Management Costa Blanca</title>

  <!-- Símbolo casa + checkmark -->
  <g>
    <!-- base -->
    <rect x="0" y="22" width="44" height="36" rx="4" fill="#1A56DB"/>
    <!-- telhado -->
    <polygon points="-4,24 22,2 48,24" fill="#1A56DB"/>
    <!-- porta -->
    <rect x="15" y="32" width="14" height="18" rx="2" fill="#ffffff"/>
    <!-- checkmark -->
    <polyline points="10,13 18,21 34,7" fill="none" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ProClean -->
  <text x="58" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#111827" letter-spacing="-0.8">ProClean</text>

  <!-- linha azul -->
  <line x1="58" y1="44" x2="318" y2="44" stroke="#1A56DB" stroke-width="1.5" stroke-linecap="round"/>

  <!-- subtítulo -->
  <text x="59" y="57" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="400" fill="#6B7280" letter-spacing="2.5">MANAGEMENT COSTA BLANCA</text>
</svg>
